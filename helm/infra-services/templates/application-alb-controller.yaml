{{- if index .Values "infra-services" "aws_loadbalancer_enabled" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-controller
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  # Add this finalizer ONLY if you want these to cascade delete.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: {{ index .Values "infra-services" "gitops_destination_repo" }}
    targetRevision:  {{ default "HEAD" (index .Values "infra-services" "aws_loadbalancer_branch") }}
    path: helm/aws-load-balancer-controller
    helm:
      valueFiles:
        - ../aws-load-balancer-controller/values/{{ index .Values "infra-services" "environment" }}/{{ index .Values "infra-services" "region" }}/values.yaml
        - ../infra-services/values/{{ index .Values "infra-services" "environment" }}/{{ index .Values "infra-services" "region" }}/infra-facts.yaml
      values: |
        aws-load-balancer-controller:
          region: {{ index .Values "infra-services" "region" }}
          vpcID: {{ index .Values "infra-services" "vpc_id" }}
          clusterName: {{ index .Values "infra-services" "eks_cluster_name" }}
          serviceAccount:
            name: "aws-load-balancer-controller-sa"
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::{{ index .Values "infra-services" "aws_account_id" }}:role/aws-load-balancer-controller-{{ index .Values "infra-services" "eks_cluster_name" }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
{{- end }}