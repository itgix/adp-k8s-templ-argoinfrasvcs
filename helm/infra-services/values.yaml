infra-services:
  aws_loadbalancer_enabled: true
  external_dns_enabled: true
  external_secrets_enabled: true
  enable_karpenter: true
  enable_metrics_server: true
  enable_vpa: false
  enable_kyverno: false
  enable_policy_reporter: false
  enable_default_policies: false
  demo_app_enabled: false
  adp_agent_enabled: true
  enable_fluent_bit: false
  enable_prometheus_stack: false
  enable_tempo: false
  enable_loki: false
  enable_efs_csi: false
  backstage_enabled: false
  enable_devlake: false

  aws-load-balancer-controller-version: 1.7.1
  secrets-operator-version: 0.9.12
  external-dns-version: HEAD
  storage_class_custom_params_enabled: false


  aws_account_id: ~
  region: ~
  eks_cluster_name: ~
  vpc_id: ~
  dns_hosted_zone: ~
  efs_file_system_id: ~


storageClass:
  name: gp3
  isDefault: "true"
  allowVolumeExpansion: true
  provisioner: ebs.csi.aws.com
  volumeBindingMode: WaitForFirstConsumer
  type: gp3
  customParameters:
    encrypted: "true"

efsStorageClass:
  name: efs-sc
  isDefault: "false"
  allowVolumeExpansion: true
  provisioner: efs.csi.aws.com
  reclaimPolicy: Delete
  volumeBindingMode: Immediate
  parameters:
    provisioningMode: efs-ap
    directoryPerms: "700"
    ensureUniqueDirectory: "true"
    basePath: ""
    gidRangeStart: ""
    gidRangeEnd: ""
    # Advanced optional overrides passed as-is to the EFS CSI StorageClass parameters.
    # Keep empty for the default dynamic Access Point provisioning flow.
    additionalParameters: {}
