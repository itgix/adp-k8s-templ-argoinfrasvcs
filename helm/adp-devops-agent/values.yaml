# Default values for adp-devops-agent.
replicaCount: 1

image:
  repository: gitlab.itgix.com:5050/rnd/app-platform/adp-devops-agent
  pullPolicy: IfNotPresent
  tag: 0c735d77

service:
  name: adp-devops-agent
  type: ClusterIP
  port: 8000

resources: {}

externalSecrets:
  secretStore: secretstore-aws
  secretName: adp/devops-agent

qdrant:
  QDRANT_URL: "http://qdrant-vectordb.qdrant:6333/"
  useBedrockEmbeddings: "false"

apiSettings:
  APP_NAME: "ADP DevOps Agent"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_TOKEN: "change-this-to-secure-random-token"

awsSettings:
  AWS_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "anthropic.claude-3-sonnet-20240229-v1:0"
  BEDROCK_MAX_TOKENS: "4096"
  BEDROCK_TEMPERATURE: "0.0"

gitLabSettings:
  GITLAB_URL: ""
  GITLAB_TOKEN: ""
  GITOPS_REPO_URL: ""
  GITOPS_REPO_PATH: "/tmp/gitops-repo"

branchSettings:
  BRANCH_PREFIX: "ai-agent/"
  DEFAULT_TARGET_BRANCH: "main"

indexingSettings:
  AUTO_INDEX_ON_STARTUP: "false"
  INDEX_REFRESH_INTERVAL_HOURS: "24"

promptsConfig:
  PROMPTS_CONFIG_PATH: "/app/config/prompts.yaml"
  configMapName: adp-agent-prompts

serviceAccount:
  name: sa-itgix-adp-devops-agent
configMap:
  name: adp-devops-agent-config

secretEnv:
  - name: QDRANT__SERVICE__API_KEY
    secretName: qdrant-env-secret
    secretKey: password
  - name: QDRANT_API_KEY
    secretName: qdrant-env-secret
    secretKey: password
  - name: GITLAB_TOKEN
    secretName: gitlab-token-secret
    secretKey: token
  - name: API_TOKEN
    secretName: api-token-secret
    secretKey: token
  - name: AWS_ACCESS_KEY_ID   
    secretName: aws-secret-access-key-id
    secretKey: key_id
  - name: AWS_SECRET_ACCESS_KEY   
    secretName: aws-secret-access-key
    secretKey: access_key
