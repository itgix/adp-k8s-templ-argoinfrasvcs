apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: qdrant-env-secret
  labels:
    app: {{ .Release.Name }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore

  target:
    name: qdrant-env-secret
    creationPolicy: Owner
  dataFrom:
  {{- range .Values.externalsecretEnv.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
  {{- end }}
